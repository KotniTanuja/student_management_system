{% extends 'tasks/base.html' %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">

    <div class="col-md-6">
        <div class="card text-white bg-primary shadow">
            <div class="card-body text-center">
                <h3>{{ total_students }}</h3>
                <p>Total Students</p>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card text-white bg-success shadow">
            <div class="card-body text-center">
                <h3>{{ total_courses }}</h3>
                <p>Total Courses</p>
            </div>
        </div>
    </div>

</div>

{% endblock %}
