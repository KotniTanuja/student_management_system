<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="{% url 'student_list' %}">
            🎓 Student Management
        </a>

        <!-- Mobile Toggle Button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">

                {% if user.is_authenticated %}

                    <li class="nav-item">
                        <span class="nav-link text-white">
                            👋 Hello, <strong>{{ user.username }}</strong>
                        </span>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'student_list' %}">
                            Students
                        </a>
                    </li>

                    <!-- Logout (POST Method Recommended) -->
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-light ms-2">
                                Logout
                            </button>
                        </form>
                    </li>

                {% else %}
                    <li class="nav-item">
                        <a class="btn btn-light" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<!-- Page Content -->
<main class="container my-4 flex-grow-1">
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
<footer class="bg-white text-center py-3 shadow-sm mt-auto">
    <small class="text-muted">
        © 2026 Student Management System | Built with Django & Bootstrap
    </small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
