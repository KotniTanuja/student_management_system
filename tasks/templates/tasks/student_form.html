{% extends 'tasks/base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h3 class="mb-4">
            {% if student %} Edit Student {% else %} Add Student {% endif %}
        </h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ student.name|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Roll Number</label>
                <input type="text" name="roll_number" class="form-control"
                       value="{{ student.roll_number|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{{ student.email|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Course</label>
                <input type="text" name="course" class="form-control"
                       value="{{ student.course|default:'' }}" required>
            </div>

            <button type="submit" class="btn btn-primary">
                Save
            </button>

            <a href="{% url 'student_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
